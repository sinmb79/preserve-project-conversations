name: Bug report
description: Report something that is broken or surprising.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include commands and a minimal sanitized input when possible.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        Command:
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Check
      options:
        - label: I removed secrets, private transcripts, and personal data from this report.
          required: true
