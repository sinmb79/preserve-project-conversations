name: Feature request
description: Suggest an improvement.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
  - type: checkboxes
    id: fit
    attributes:
      label: Project Fit
      options:
        - label: This keeps the default workflow local-first.
          required: true
        - label: This does not require sending transcripts to a remote service by default.
          required: true
